name: Bug Report
description: Report a bug or unexpected behavior
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
      placeholder: "When I clicked on..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: "I expected it to..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open the app
        2. Navigate to...
        3. Click on...

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15.2, Ubuntu 24.04, Windows 11"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App Version
      placeholder: "0.1.0"
    validations:
      required: true
