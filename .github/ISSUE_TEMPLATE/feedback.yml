name: Feedback
description: Share your experience using Circle Explorer
title: "Feedback: "
labels: ["ux-feedback"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for trying Circle Explorer! Your feedback helps us understand if concentric circle navigation actually works for daily use.

  - type: textarea
    id: experience
    attributes:
      label: Your experience
      description: What did you try? How did it feel? What worked well, what didn't?
      placeholder: "I tried navigating my project folder and..."
    validations:
      required: true

  - type: dropdown
    id: view-preference
    attributes:
      label: Which view do you prefer?
      options:
        - Circle view (the concentric rings)
        - List view (the table)
        - I switch between both
        - Neither — I went back to Finder/Explorer
    validations:
      required: true

  - type: dropdown
    id: would-use-again
    attributes:
      label: Would you use this again?
      options:
        - Yes, I'd use it regularly
        - Maybe, with improvements
        - Probably not
        - Definitely not
    validations:
      required: true

  - type: textarea
    id: improvements
    attributes:
      label: What would make it better?
      description: Features, UX changes, anything
      placeholder: "I wish it could..."

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15.2, Ubuntu 24.04, Windows 11"

  - type: input
    id: version
    attributes:
      label: App Version
      placeholder: "0.1.0"
